name: edge daily report

on:
  schedule:
    # 14:00 UTC = 10am EDT / 9am EST — morning MLB-only run
    - cron: '0 14 * * *'
    # 19:00 UTC = 3pm EDT / 2pm EST — afternoon all-sports run
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      sports:
        description: 'Comma-separated sports list'
        required: false
        default: 'mlb,nba,nhl'

jobs:
  card-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Determine sports filter
        id: sports
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.sports }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            echo "value=mlb" >> "$GITHUB_OUTPUT"
          else
            echo "value=mlb,nba,nhl" >> "$GITHUB_OUTPUT"
          fi

      - name: Run report
        run: npm run edge:report -- --sports=${{ steps.sports.outputs.value }}
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
          EDGE_HOME: ${{ github.workspace }}
